# Deploys to Cloudflare Workers when a GitHub Release is published.
#
# The @astrojs/cloudflare adapter builds a Workers Static Assets bundle
# (dist/server/entry.mjs + dist/client/ + a generated dist/server/wrangler.json),
# so we deploy with `wrangler deploy`, not `wrangler pages deploy`.
#
# Required repository secrets:
#   CLOUDFLARE_API_TOKEN  - token with "Workers Scripts: Edit" + "D1: Edit" permissions
#   CLOUDFLARE_ACCOUNT_ID - your Cloudflare account id
#   D1_DATABASE_ID        - the D1 database id (injected into wrangler.jsonc at deploy time)
#
# The app's own runtime secrets (APP_PASSWORD / ENCRYPTION_KEY / SESSION_SECRET)
# must be set on the Worker (`wrangler secret put ...` or the dashboard), not here.
name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch: # allow manual deploys from the Actions tab

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject D1 database id into wrangler.jsonc
        env:
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
        run: sed -i "s|REPLACE_WITH_D1_DATABASE_ID|${D1_DATABASE_ID}|" wrangler.jsonc

      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply ses-astro --remote

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --config dist/server/wrangler.json
